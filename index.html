<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111823" />
    <meta name="description" content="Number Connect — 一笔连接所有数字的浏览器益智游戏" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>Number Connect</title>
  </head>
  <body>
    <main id="app" class="app-shell">
      <section id="lobby-screen" class="screen lobby-screen" aria-labelledby="lobby-title">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true"><i>1</i><i>2</i><i>3</i></span>
          <h1 id="lobby-title">Number Connect</h1>
        </div>

        <div class="lobby-ambient-field" aria-hidden="true">
          <svg viewBox="0 0 430 760" preserveAspectRatio="xMidYMid slice" role="presentation">
            <defs>
              <linearGradient id="lobby-ambient-gradient" x1="210" y1="650" x2="210" y2="150" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#c775e8" />
                <stop offset=".48" stop-color="#58d0aa" />
                <stop offset="1" stop-color="#659ee4" />
              </linearGradient>
              <linearGradient id="lobby-ambient-line-mask-gradient" x1="0" y1="150" x2="0" y2="610" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="white" stop-opacity="0" />
                <stop offset=".18" stop-color="white" />
                <stop offset=".78" stop-color="white" />
                <stop offset="1" stop-color="white" stop-opacity="0" />
              </linearGradient>
              <radialGradient id="lobby-ambient-halo">
                <stop offset="0" stop-color="#58d0aa" stop-opacity=".13" />
                <stop offset="1" stop-color="#111823" stop-opacity="0" />
              </radialGradient>
              <pattern id="lobby-ambient-grid-pattern" width="60" height="60" patternUnits="userSpaceOnUse">
                <circle cx="30" cy="30" r="2.4" fill="#a4bfd0" fill-opacity=".2" />
              </pattern>
              <mask id="lobby-ambient-middle-mask" maskUnits="userSpaceOnUse" x="0" y="150" width="430" height="460">
                <rect x="0" y="150" width="430" height="460" fill="url(#lobby-ambient-line-mask-gradient)" />
              </mask>
              <path id="lobby-ambient-route" pathLength="1" d="M210 930 L270 870 L210 810 L150 750 L210 690 L270 630 L210 570 L150 510 L210 450 L270 390 L210 330 L150 270 L210 210 L270 150 L210 90 L150 30 L210 -30 L270 -90 L210 -150" />
            </defs>

            <ellipse class="lobby-ambient-halo lobby-ambient-halo--top" cx="115" cy="280" rx="230" ry="210" fill="url(#lobby-ambient-halo)" />
            <ellipse class="lobby-ambient-halo lobby-ambient-halo--bottom" cx="350" cy="520" rx="250" ry="220" fill="url(#lobby-ambient-halo)" />
            <rect class="lobby-ambient-grid" x="-60" y="-300" width="550" height="1300" fill="url(#lobby-ambient-grid-pattern)" />

            <g mask="url(#lobby-ambient-middle-mask)">
              <g class="lobby-ambient-route-layer">
                <use class="lobby-ambient-route lobby-ambient-route--base" href="#lobby-ambient-route" />
                <use class="lobby-ambient-route lobby-ambient-route--flow" href="#lobby-ambient-route" />
              </g>
            </g>

          </svg>
        </div>

        <button id="bead-mode-button" class="bead-mode-entry" type="button" aria-label="进入拼豆模式">
          <span class="bead-mode-preview" aria-hidden="true">
            <i></i><i class="is-pink"></i><i></i><i class="is-violet"></i><i></i>
            <i class="is-pink"></i><i class="is-pink"></i><i class="is-violet"></i><i class="is-violet"></i><i class="is-violet"></i>
            <i class="is-pink"></i><i class="is-gold"></i><i class="is-pink"></i><i class="is-violet"></i><i class="is-violet"></i>
            <i></i><i class="is-pink"></i><i class="is-pink"></i><i class="is-violet"></i><i></i>
            <i></i><i></i><i class="is-pink"></i><i></i><i></i>
          </span>
          <span class="bead-mode-copy">
            <small>PIXEL BEADS</small>
            <strong>拼豆模式</strong>
            <span>选颜色 · 拼出像素图案</span>
          </span>
          <span class="bead-mode-arrow" aria-hidden="true">›</span>
        </button>

        <nav class="lobby-actions" aria-label="主菜单">
          <button id="start-button" class="menu-button menu-button--primary">
            <span class="menu-icon">▶</span><span><strong>开始游戏</strong><small>从关卡列表继续</small></span>
          </button>
          <button id="endless-button" class="menu-button menu-button--endless">
            <span class="menu-icon">∞</span><span><strong>无尽模式</strong><small>难度随阶段提升</small></span>
          </button>
          <button id="editor-button" class="menu-button menu-button--editor">
            <span class="menu-icon">✦</span><span><strong>关卡编辑器</strong><small>绘制并保存你的关卡</small></span>
          </button>
          <button id="lobby-settings-button" class="menu-button menu-button--quiet">
            <span class="menu-icon">⚙</span><span><strong>游戏设置</strong><small>棋盘、提示与声音</small></span>
          </button>
        </nav>

      </section>

      <section id="play-screen" class="screen play-screen" hidden aria-label="游戏界面">
        <header class="game-header">
          <button id="back-button" class="icon-button" aria-label="返回大厅">←</button>
          <div class="game-heading">
            <p id="play-mode-label">NUMBER CONNECT</p>
            <h2 id="play-level-label">关卡 1</h2>
          </div>
          <button id="play-settings-button" class="icon-button" aria-label="打开设置">⚙</button>
        </header>
        <div class="status-strip">
          <span id="play-lives" class="life-counter" role="status" aria-live="polite" aria-label="生命值 3" hidden>♥♥♥</span>
          <span class="status-dot" aria-hidden="true"></span>
          <p id="play-status" aria-live="polite">可从任意显示数字开始</p>
          <button id="solution-toggle" class="solution-toggle" type="button" aria-pressed="false" aria-label="显示隐藏数字和完整连线">
            <span aria-hidden="true">◎</span><b id="solution-toggle-label">显示答案</b>
          </button>
        </div>
        <div id="game-host" class="game-host" aria-label="数字连接棋盘"></div>
        <p class="gesture-hint">按住并拖动，依次连接相邻或斜对角数字</p>

        <div id="result-overlay" class="result-overlay" hidden>
          <div class="result-card">
            <span id="result-kicker" class="result-kicker">PUZZLE COMPLETE</span>
            <h2 id="result-title">漂亮的一笔！</h2>
            <p id="result-message">你已连接棋盘上的所有数字。</p>
            <div id="result-reward" class="result-reward" hidden>♥ +1</div>
            <div id="result-actions" class="result-actions">
              <button id="restart-button" class="button button--secondary">重新挑战</button>
              <button id="next-button" class="button button--primary">下一关</button>
            </div>
            <button id="result-lobby-button" class="text-button">返回大厅</button>
          </div>
        </div>
      </section>

      <section id="editor-screen" class="screen editor-screen" hidden></section>

      <section id="bead-screen" class="screen bead-screen" hidden aria-labelledby="bead-screen-title">
        <header class="bead-screen-header">
          <button id="bead-back-button" class="icon-button" type="button" aria-label="返回大厅">←</button>
          <div>
            <p>PIXEL BEADS</p>
            <h2 id="bead-screen-title">拼豆模式</h2>
          </div>
          <span aria-hidden="true"></span>
        </header>
        <div class="bead-screen-stage">
          <div class="bead-pattern-heading">
            <div><p class="eyebrow">CURRENT PATTERN</p><h3 id="bead-pattern-name">橙色小猫</h3></div>
            <strong id="bead-progress-text">0 / 0</strong>
          </div>
          <div id="bead-pattern-board" class="bead-pattern-board" role="img" aria-label="20乘20拼豆图纸"></div>
          <div class="bead-progress-track" role="progressbar" aria-label="拼豆完成进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><i id="bead-progress-fill"></i></div>
          <p id="bead-screen-status" class="bead-screen-status" aria-live="polite">正在读取拼豆图纸…</p>
          <button id="bead-start-button" class="button bead-start-button" type="button">进入普通关卡</button>
        </div>
      </section>
    </main>

    <dialog id="settings-dialog" class="settings-dialog">
      <form method="dialog" class="settings-card">
        <header><div><p class="eyebrow">GAME OPTIONS</p><h2>游戏设置</h2></div><button id="settings-close-button" class="icon-button" value="cancel" aria-label="关闭">×</button></header>
        <div id="endless-settings-note" class="settings-note" hidden>无尽模式关卡由当前阶段自动生成，关卡列表不可切换。</div>
        <div class="settings-list">
          <label class="setting-row"><span><b>关卡列表</b><small>读取内置与本地编辑器关卡</small></span><select id="settings-level"></select></label>
          <label class="setting-row"><span><b>下一个数字提示</b><small>高亮下一处可见数字</small></span><input id="settings-next" class="switch" type="checkbox" checked /></label>
          <label class="setting-row"><span><b>游戏声音</b><small>连击、错误和胜利反馈</small></span><input id="settings-sound" class="switch" type="checkbox" checked /></label>
          <button id="video-stats-button" class="setting-row setting-row--button" type="button"><span><b>视频统计</b><small>查看奖励视频的触发点位</small></span><strong id="video-stats-count">0 次 ›</strong></button>
        </div>
        <footer class="settings-actions"><button id="settings-lobby-button" class="button button--secondary" type="button">返回大厅</button><button id="settings-apply-button" class="button button--primary" type="button">应用设置</button></footer>
      </form>
    </dialog>

    <dialog id="video-stats-dialog" class="video-stats-dialog">
      <form method="dialog" class="video-stats-card">
        <header><div><p class="eyebrow">VIDEO REWARDS</p><h2>视频统计</h2></div><button class="icon-button" value="cancel" aria-label="关闭视频统计">×</button></header>
        <div class="video-stats-summary"><strong id="video-stats-total">0</strong><span>累计观看次数</span></div>
        <p id="video-stats-empty" class="video-stats-empty">还没有观看记录。</p>
        <ol id="video-stats-list" class="video-stats-list" aria-label="广告点位统计"></ol>
        <footer><button id="video-stats-reset" class="button button--secondary" type="button">重置统计</button><button class="button button--primary" value="confirm">完成</button></footer>
      </form>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
