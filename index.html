<!doctype html>
<html lang="zh-CN" data-theme="default">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fff4e3" />
    <meta name="description" content="Number Connect — 一笔连接所有数字的浏览器益智游戏" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>Number Connect</title>
  </head>
  <body>
    <main id="app" class="app-shell" data-primary-tab="lobby">
      <div class="lobby-ambient-field" aria-hidden="true">
        <svg viewBox="0 0 430 760" preserveAspectRatio="xMidYMid slice" role="presentation">
          <defs>
            <linearGradient id="lobby-ambient-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0" stop-color="#c775e8" />
              <stop offset=".48" stop-color="#58d0aa" />
              <stop offset="1" stop-color="#659ee4" />
            </linearGradient>
            <linearGradient id="lobby-ambient-line-mask-gradient" x1="0" y1="150" x2="0" y2="610" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="white" stop-opacity="0" />
              <stop offset=".18" stop-color="white" />
              <stop offset=".78" stop-color="white" />
              <stop offset="1" stop-color="white" stop-opacity="0" />
            </linearGradient>
            <radialGradient id="lobby-ambient-halo">
              <stop offset="0" stop-color="#58d0aa" stop-opacity=".13" />
              <stop offset="1" stop-color="#111823" stop-opacity="0" />
            </radialGradient>
            <mask id="lobby-ambient-middle-mask" maskUnits="userSpaceOnUse" x="0" y="150" width="430" height="460">
              <rect x="0" y="150" width="430" height="460" fill="url(#lobby-ambient-line-mask-gradient)" />
            </mask>
          </defs>

          <ellipse class="lobby-ambient-halo lobby-ambient-halo--top" cx="115" cy="280" rx="230" ry="210" fill="url(#lobby-ambient-halo)" />
          <ellipse class="lobby-ambient-halo lobby-ambient-halo--bottom" cx="350" cy="520" rx="250" ry="220" fill="url(#lobby-ambient-halo)" />
          <g id="lobby-ambient-grid" class="lobby-ambient-grid"></g>

          <g mask="url(#lobby-ambient-middle-mask)">
            <g id="lobby-ambient-route-layer" class="lobby-ambient-route-layer">
              <path id="lobby-ambient-route-base" class="lobby-ambient-route lobby-ambient-route--base" />
              <path id="lobby-ambient-route-flow" class="lobby-ambient-route lobby-ambient-route--flow" />
              <circle id="lobby-ambient-route-head" class="lobby-ambient-route-head" cx="210" cy="390" r="9.2" />
            </g>
          </g>
        </svg>
      </div>

      <section id="lobby-screen" class="screen lobby-screen" aria-label="Number Connect 大厅">
        <div class="lobby-theme-panel lobby-theme-panel--default">
          <button id="default-lobby-settings-button" class="default-settings-button" type="button" aria-label="打开设置">
            <img src="./theme-default/settings.png" alt="" />
          </button>

          <div class="default-feature-grid" aria-label="特色玩法">
            <button id="default-daily-challenge-button" class="default-feature-card default-feature-card--daily" type="button" aria-label="打开每日挑战">
              <strong>每日挑战</strong>
              <span class="default-feature-artwork" aria-hidden="true">
                <img src="./theme-default/activity-daily-art.png" alt="" />
              </span>
            </button>
            <button id="default-bead-mode-button" class="default-feature-card default-feature-card--bead" type="button" aria-label="进入拼豆模式">
              <strong>拼豆玩法</strong>
              <span class="default-feature-artwork" aria-hidden="true">
                <img src="./theme-default/activity-bead-art.png" alt="" />
              </span>
            </button>
          </div>

          <button id="default-editor-button" class="default-brand-lockup" type="button" aria-label="打开关卡编辑器">
            <img src="./theme-default/logo.png" alt="" />
          </button>

          <button id="default-start-button" class="default-start-button" type="button">
            <span>第 <b id="default-level-number">1</b> 关</span>
          </button>

        </div>

        <div class="lobby-theme-panel lobby-theme-panel--night">
        <button id="night-editor-button" class="brand-lockup" type="button" aria-label="打开关卡编辑器">
          <span class="brand-mark" aria-hidden="true"><i>1</i><i>2</i><i>3</i></span>
          <h1 id="lobby-title">Number Connect</h1>
        </button>

        <div class="lobby-feature-stack">
          <button id="bead-mode-button" class="bead-mode-entry" type="button" aria-label="进入拼豆模式">
            <span class="bead-mode-preview" aria-hidden="true">
              <i></i><i class="is-pink"></i><i></i><i class="is-violet"></i><i></i>
              <i class="is-pink"></i><i class="is-pink"></i><i class="is-violet"></i><i class="is-violet"></i><i class="is-violet"></i>
              <i class="is-pink"></i><i class="is-gold"></i><i class="is-pink"></i><i class="is-violet"></i><i class="is-violet"></i>
              <i></i><i class="is-pink"></i><i class="is-pink"></i><i class="is-violet"></i><i></i>
              <i></i><i></i><i class="is-pink"></i><i></i><i></i>
            </span>
            <span class="bead-mode-copy">
              <strong>拼豆模式</strong>
              <span>选颜色 · 拼出像素图案</span>
            </span>
            <span class="bead-mode-arrow" aria-hidden="true">›</span>
          </button>

          <button id="daily-challenge-entry-button" class="collection-mode-entry" type="button" aria-label="打开每日挑战">
            <span class="collection-mode-symbol" aria-hidden="true"><i></i><i></i><i></i><b>◇</b></span>
            <span class="collection-mode-copy">
              <strong>每日挑战</strong>
              <span>每天一局 · 点亮挑战日历</span>
            </span>
            <span class="collection-mode-progress"><b>今日</b><i aria-hidden="true">›</i></span>
          </button>
        </div>

        <nav class="lobby-actions" aria-label="主菜单">
          <button id="start-button" class="menu-button menu-button--primary">
            <span class="menu-icon">▶</span><span><strong>开始游戏</strong><small>从关卡列表继续</small></span>
          </button>
          <button id="endless-button" class="menu-button menu-button--endless">
            <span class="menu-icon">∞</span><span><strong>无尽模式</strong><small>查看阶段、生命与历史记录</small></span>
          </button>
          <button id="challenge-button" class="menu-button menu-button--editor">
            <span class="menu-icon">▦</span><span><strong>每日挑战</strong><small>从日历选择今天的棋盘</small></span>
          </button>
          <button id="lobby-settings-button" class="menu-button menu-button--quiet">
            <span class="menu-icon">⚙</span><span><strong>游戏设置</strong><small>棋盘、提示与声音</small></span>
          </button>
        </nav>

        </div>

      </section>

      <section id="play-screen" class="screen play-screen" hidden aria-label="游戏界面">
        <header class="game-header">
          <div class="game-heading">
            <button id="play-level-button" class="play-level-button" type="button" aria-haspopup="dialog" aria-controls="level-picker-dialog"><span id="play-level-label">关卡 1</span></button>
            <span id="play-lives" class="life-counter" role="status" aria-live="polite" aria-label="生命值 3" hidden>♥♥♥</span>
            <p class="progress-counter" aria-label="连接进度"><b id="play-progress" aria-live="polite">0 / 0</b></p>
          </div>
          <button id="play-settings-button" class="header-settings-image-button play-settings-image-button" aria-label="打开设置"><img src="./theme-default/settings.png" alt="" draggable="false" /></button>
        </header>
        <div id="game-host" class="game-host" aria-label="数字连接棋盘"></div>
        <aside id="touch-preview" class="touch-preview" aria-label="关卡小窗，可按住任意位置拖动" hidden>
          <div id="touch-preview-surface" class="touch-preview-surface">
            <div id="touch-preview-board" class="touch-preview-board" role="img" aria-label="等待关卡载入">
              <svg id="touch-preview-lines" class="touch-preview-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true" focusable="false">
                <g id="touch-preview-path-lines"></g>
                <line id="touch-preview-pointer-line" class="touch-preview-pointer-line" hidden></line>
              </svg>
              <div id="touch-preview-cells" class="touch-preview-cells" aria-hidden="true"></div>
            </div>
          </div>
        </aside>
        <div id="result-overlay" class="result-overlay" hidden>
          <div class="result-card">
            <h2 id="result-title">漂亮的一笔！</h2>
            <p id="result-message">你已连接棋盘上的所有数字。</p>
            <div id="result-reward" class="result-reward" hidden>♥ +1</div>
            <div id="result-actions" class="result-actions">
              <button id="restart-button" class="button button--secondary">重新挑战</button>
              <button id="next-button" class="button button--primary">下一关</button>
            </div>
            <button id="result-lobby-button" class="text-button">返回大厅</button>
          </div>
        </div>
      </section>

      <section id="editor-screen" class="screen editor-screen" hidden></section>

      <section id="collection-screen" class="screen collection-screen" hidden aria-labelledby="collection-screen-title">
        <header class="collection-screen-header">
          <button id="collection-back-button" class="icon-button" type="button" aria-label="返回大厅">←</button>
          <div>
            <h2 id="collection-screen-title">收集玩法</h2>
          </div>
          <button id="collection-gallery-button" class="icon-button" type="button" aria-label="打开拼豆图鉴">▦</button>
        </header>
        <div class="collection-map-scroll">
          <div class="collection-map-heading">
            <div><h3>沿着路线逐关前进</h3></div>
            <strong id="collection-route-progress">0 / 7</strong>
          </div>
          <div id="collection-route" class="collection-route" aria-label="收集玩法关卡路线">
            <svg id="collection-route-lines" class="collection-route-lines" aria-hidden="true" focusable="false">
              <path id="collection-route-base"></path>
              <path id="collection-route-complete"></path>
            </svg>
          </div>
        </div>
      </section>

      <section id="daily-screen" class="screen daily-screen" hidden aria-labelledby="daily-screen-title">
        <header class="daily-screen-header">
          <button id="daily-today-button" class="daily-today-button" type="button">今天</button>
          <div>
            <h2 id="daily-screen-title">每日挑战</h2>
          </div>
          <button id="daily-settings-button" class="header-settings-image-button" type="button" aria-label="打开设置"><img src="./theme-default/settings.png" alt="" draggable="false" /></button>
        </header>

        <div class="daily-screen-stage">
          <section class="daily-flat-hero" aria-label="本月挑战进度">
            <div class="daily-trophy" aria-hidden="true">
              <svg viewBox="0 0 240 170" role="presentation">
                <path class="daily-trophy-handle" d="M75 45H40l16 43 25-19M165 45h35l-16 43-25-19" />
                <path class="daily-trophy-cup" d="M72 31h96v40c0 34-21 55-48 55S72 105 72 71V31Z" />
                <ellipse class="daily-trophy-rim" cx="120" cy="31" rx="48" ry="10" />
                <path class="daily-trophy-stem" d="M108 120h24l11 27h-46l11-27Z" />
                <ellipse class="daily-trophy-base" cx="120" cy="148" rx="43" ry="13" />
                <path class="daily-trophy-shine" d="M92 45c1 28 7 47 22 61-23-3-33-20-33-43V43l11 2Z" />
              </svg>
            </div>
            <div class="daily-month-progress">
              <strong id="daily-complete-count" aria-label="本月已完成 0 天"><b>0</b></strong>
              <span id="daily-progress-track" class="daily-progress-track" role="progressbar" aria-label="本月挑战进度" aria-valuemin="0" aria-valuemax="31" aria-valuenow="0"><i id="daily-progress-fill"></i></span>
              <strong id="daily-month-total">31</strong>
            </div>
          </section>

          <section class="daily-calendar-card" aria-label="每日挑战日历">
            <header class="daily-calendar-toolbar">
              <button id="daily-previous-month" type="button" aria-label="上个月">‹</button>
              <h3 id="daily-month-label">2026 年 7 月</h3>
              <button id="daily-next-month" type="button" aria-label="下个月">›</button>
            </header>
            <div class="daily-weekdays" aria-hidden="true"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
            <div id="daily-calendar-grid" class="daily-calendar-grid" role="grid" aria-labelledby="daily-month-label"></div>
          </section>

          <button id="daily-play-button" class="daily-play-button" type="button">开始挑战</button>
        </div>
      </section>

      <section id="endless-screen" class="screen endless-hub-screen" hidden aria-labelledby="endless-screen-title">
        <header class="hub-screen-header endless-screen-header">
          <article class="endless-header-best" aria-label="历史最高阶段">
            <span aria-hidden="true">♛</span><small>历史最高阶段</small><strong id="endless-best-stage">1</strong>
          </article>
          <div><h2 id="endless-screen-title">无尽模式</h2></div>
          <button id="endless-settings-button" class="header-settings-image-button" type="button" aria-label="打开设置"><img src="./theme-default/settings.png" alt="" draggable="false" /></button>
        </header>
        <div class="endless-hub-stage">
          <div class="endless-stat-grid" aria-label="无尽模式状态">
            <article class="endless-stat endless-stat--stage"><small>当前阶段</small><strong id="endless-current-stage">1</strong></article>
            <article class="endless-stat endless-stat--lives"><strong id="endless-current-lives" aria-live="polite" aria-label="当前生命 3">♥♥♥</strong></article>
          </div>
          <button id="endless-start-button" class="endless-start-button" type="button"><span>开始游戏</span></button>
        </div>
      </section>

      <section id="favorites-screen" class="screen favorites-screen" hidden aria-labelledby="favorites-screen-title">
        <header class="hub-screen-header favorites-screen-header">
          <div><h2 id="favorites-screen-title">收藏</h2></div>
        </header>
        <div class="favorites-stage">
          <div class="favorites-tabs" role="tablist" aria-label="收藏类型">
            <button id="favorites-album-tab" class="is-active" type="button" role="tab" aria-selected="true" aria-controls="favorites-album-panel">画册收集</button>
            <button id="favorites-bead-tab" type="button" role="tab" aria-selected="false" aria-controls="favorites-bead-panel">拼豆收集</button>
          </div>
          <div class="favorites-summary"><div><h3 id="favorites-summary-title">旅途画册</h3></div><strong id="favorites-summary-count">0 / 0</strong></div>
          <div id="favorites-album-panel" class="favorites-panel" role="tabpanel" aria-labelledby="favorites-album-tab"><div id="favorites-album-grid" class="favorites-grid" role="list"></div></div>
          <div id="favorites-bead-panel" class="favorites-panel" role="tabpanel" aria-labelledby="favorites-bead-tab" hidden><div id="favorites-bead-grid" class="favorites-grid" role="list"></div></div>
        </div>
      </section>

      <section id="bead-screen" class="screen bead-screen" hidden aria-labelledby="bead-screen-title">
        <header class="bead-screen-header">
          <button id="bead-back-button" class="icon-button" type="button" aria-label="返回大厅">←</button>
          <div>
            <h2 id="bead-screen-title">拼豆模式</h2>
          </div>
          <button id="bead-gallery-button" class="icon-button bead-gallery-entry" type="button" aria-label="打开拼豆图鉴">
            <span aria-hidden="true">▦</span><b id="bead-gallery-count">0</b>
          </button>
        </header>
        <div class="bead-screen-stage">
          <div class="bead-pattern-heading">
            <div><h3 id="bead-pattern-name">橙色小猫</h3></div>
            <strong id="bead-progress-text">0 / 0</strong>
          </div>
          <div id="bead-pattern-board" class="bead-pattern-board" role="img" aria-label="20乘20拼豆图纸"></div>
          <div class="bead-progress-track" role="progressbar" aria-label="拼豆完成进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><i id="bead-progress-fill"></i></div>
          <p id="bead-screen-status" class="bead-screen-status" aria-live="polite">正在读取拼豆图纸…</p>
          <button id="bead-start-button" class="button bead-start-button" type="button">进入普通关卡</button>
        </div>
      </section>

      <button id="primary-action-button" class="primary-action-button" type="button" data-action-theme="lobby" aria-label="开始第 1 关">
        <span id="primary-action-label">第 1 关</span>
      </button>

      <nav id="primary-tab-bar" class="primary-tab-bar" aria-label="主页面导航">
        <button id="tab-lobby-button" class="primary-tab-button is-active" type="button" data-tab="lobby" aria-current="page">
          <img src="./theme-default/dock-icons/dock-home.png" alt="" aria-hidden="true" draggable="false" /><span>大厅</span><i aria-hidden="true"></i>
        </button>
        <button id="tab-challenge-button" class="primary-tab-button" type="button" data-tab="challenge">
          <img src="./theme-default/dock-icons/dock-challenge.png" alt="" aria-hidden="true" draggable="false" /><span>挑战</span><i aria-hidden="true"></i>
        </button>
        <button id="tab-endless-button" class="primary-tab-button" type="button" data-tab="endless">
          <img src="./theme-default/dock-icons/dock-endless.png" alt="" aria-hidden="true" draggable="false" /><span>无尽</span><i aria-hidden="true"></i>
        </button>
        <button id="tab-favorites-button" class="primary-tab-button" type="button" data-tab="favorites">
          <img src="./theme-default/dock-icons/dock-favorites.png" alt="" aria-hidden="true" draggable="false" /><span>收藏</span><i aria-hidden="true"></i>
        </button>
      </nav>
    </main>

    <dialog id="bead-gallery-dialog" class="bead-gallery-dialog" aria-labelledby="bead-gallery-title">
      <section class="bead-gallery-card">
        <header class="bead-gallery-header">
          <div><h2 id="bead-gallery-title">拼豆图鉴</h2></div>
          <button id="bead-gallery-close" class="icon-button" type="button" aria-label="关闭图鉴">×</button>
        </header>
        <div id="bead-gallery-list-view" class="bead-gallery-list-view">
          <p class="bead-gallery-summary">已收藏 <strong id="bead-gallery-total">0 / 0</strong></p>
          <div id="bead-gallery-empty" class="bead-gallery-empty">
            <span aria-hidden="true">◇</span>
            <strong>图鉴还是空的</strong>
            <p>完成第一个拼豆图案后，作品会收藏在这里。</p>
          </div>
          <div id="bead-gallery-grid" class="bead-gallery-grid" role="list"></div>
        </div>
        <div id="bead-gallery-detail" class="bead-gallery-detail" hidden>
          <button id="bead-gallery-detail-back" class="bead-gallery-detail-back" type="button">← 返回图鉴</button>
          <div class="bead-gallery-detail-heading">
            <h3 id="bead-gallery-detail-name"></h3>
            <span id="bead-gallery-detail-size"></span>
          </div>
          <div class="bead-gallery-detail-art"><img id="bead-gallery-detail-image" alt="" /></div>
        </div>
      </section>
    </dialog>

    <dialog id="level-picker-dialog" class="level-picker-dialog" aria-labelledby="level-picker-title">
      <form method="dialog" class="level-picker-card">
        <header><h2 id="level-picker-title">选择关卡</h2><button id="level-picker-close-button" class="icon-button" value="cancel" aria-label="关闭">×</button></header>
        <div id="level-picker-grid" class="level-picker-grid" role="list"></div>
      </form>
    </dialog>

    <dialog id="settings-dialog" class="settings-dialog">
      <form method="dialog" class="settings-card">
        <header><div><h2>游戏设置</h2></div><button id="settings-close-button" class="icon-button" value="cancel" aria-label="关闭">×</button></header>
        <div class="settings-list">
          <label class="setting-row"><span><b>下一个数字提示</b><small>高亮下一处可见数字</small></span><input id="settings-next" class="switch" type="checkbox" checked /></label>
          <label class="setting-row"><span><b>游戏声音</b><small>连击、错误和胜利反馈</small></span><input id="settings-sound" class="switch" type="checkbox" checked /></label>
          <div class="setting-row setting-row--theme"><span><b>大厅主题</b><small>默认明亮风格或原版夜间风格</small></span><div id="settings-theme" class="setting-segmented setting-theme-control" role="radiogroup" aria-label="大厅主题"><label><input type="radio" name="ui-theme" value="default" checked /><span>默认</span></label><label><input type="radio" name="ui-theme" value="night" /><span>夜间</span></label></div></div>
          <label id="settings-solution-row" class="setting-row" hidden><span><b>显示答案</b><small>显示隐藏数字和完整连线</small></span><input id="solution-toggle" class="switch" type="checkbox" /></label>
          <div class="setting-row setting-row--preview-size"><span><b>关卡小窗</b><small>选择关闭、窗口大小或扩展显示范围</small></span><div id="touch-preview-size" class="setting-segmented" role="radiogroup" aria-label="关卡小窗大小"><label><input type="radio" name="touch-preview-size" value="off" /><span>关闭</span></label><label><input type="radio" name="touch-preview-size" value="small" checked /><span>小</span></label><label><input type="radio" name="touch-preview-size" value="medium" /><span>中</span></label><label><input type="radio" name="touch-preview-size" value="large" /><span>大</span></label></div></div>
          <label class="setting-row"><span><b>小窗跟手</b><small>让关卡小窗始终显示在触摸位置上方</small></span><input id="settings-touch-preview-follow" class="switch" type="checkbox" /></label>
          <button id="video-stats-button" class="setting-row setting-row--button" type="button"><span><b>视频统计</b><small>查看奖励视频的触发点位</small></span><strong id="video-stats-count">0 次 ›</strong></button>
        </div>
        <footer id="settings-actions" class="settings-actions" hidden><button id="settings-lobby-button" class="button button--secondary" type="button">返回大厅</button></footer>
      </form>
    </dialog>

    <dialog id="video-stats-dialog" class="video-stats-dialog">
      <form method="dialog" class="video-stats-card">
        <header><div><h2>视频统计</h2></div><button class="icon-button" value="cancel" aria-label="关闭视频统计">×</button></header>
        <div class="video-stats-summary"><strong id="video-stats-total">0</strong><span>累计观看次数</span></div>
        <p id="video-stats-empty" class="video-stats-empty">还没有观看记录。</p>
        <ol id="video-stats-list" class="video-stats-list" aria-label="广告点位统计"></ol>
        <footer><button id="video-stats-reset" class="button button--secondary" type="button">重置统计</button><button class="button button--primary" value="confirm">完成</button></footer>
      </form>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
